# Example — iOS login feature.
# Demonstrates accessibility-id locator vocabulary and HIG 44pt floor.
# NOTE: this example assumes the CURRENT change is a backend validation
# tweak only — UI layout / styling is unchanged from the prior release.
# That is why ui_change is false despite the login page being visible.
# requirement_ref values are illustrative — adopt your own PRD/ticket scheme.

feature: "邮箱密码登录"
requirement_ref: "PRD-2026-019 §2.1"
platform: ios
design_tokens_source: null
ui_change: false
coverage_triggers:
  security: true
  i18n: false
  performance: false
generated_at: "2026-04-20"
generated_by: "kcc-testing/write-test-cases v0.2"

rtm_summary:
  requirement_branches_total: 3
  requirement_branches_covered: 3
  uncovered_branches: []
  unreferenced_cases: []

cases:
  - id: TC-LOGIN-001
    title: "正确邮箱与密码登录成功并进入首页"
    priority: P0
    requirement_ref: "PRD-2026-019 §2.1-a (valid credentials land on home)"
    tags: [happy-path, auth]

    preconditions:
      state: "应用冷启动至登录页"
      data_setup:
        - "通过测试后台删除任何 qa+{{uuid}}@example.com (idempotent cleanup)"
        - "通过测试后台创建账号 qa+{{uuid}}@example.com, password Pa$$word-1, role=buyer"

    steps:
      - n: 1
        action: '在 accessibility-id="email", label="邮箱" 的输入框输入 "qa+{{uuid}}@example.com"'
        oracle: '输入框显示值为 "qa+{{uuid}}@example.com"'
      - n: 2
        action: '在 accessibility-id="password", label="密码" 的输入框输入 "Pa$$word-1"'
        oracle: "输入框显示 11 位圆点掩码"
      - n: 3
        action: '点击 accessibility-id="btn_login", label="登录"'
        oracle: '等待 accessibility-id="home_title", label="首页" 在 5 秒内出现'

    assertions:
      accessibility:
        - rule: HIG-TargetSize
          target: 'accessibility-id="btn_login", label="登录"'
          min_target_size_pt: 44
        - rule: HIG-Contrast
          target: 'accessibility-id="btn_login", label="登录"'
          min_contrast_ratio: 4.5

    cleanup:
      - "通过测试后台删除账号及任何登录会话 (idempotent)"

    testability:
      oracle_present: true
      state_reachable: true
      deterministic: true
      isolated: true
      has_explicit_wait: true
      wait_spec: "step 3 waits up to 5s for home_title"

  - id: TC-LOGIN-002
    title: "错误密码应提示且不跳转"
    priority: P1
    requirement_ref: "PRD-2026-019 §2.1-b (wrong password: message + no navigation)"
    tags: [error, auth]

    preconditions:
      state: "应用冷启动至登录页"
      data_setup:
        - "通过测试后台删除任何 qa+{{uuid}}@example.com (idempotent)"
        - "通过测试后台创建账号 qa+{{uuid}}@example.com, password Pa$$word-1"

    steps:
      - n: 1
        action: '在 accessibility-id="email", label="邮箱" 的输入框输入 "qa+{{uuid}}@example.com"'
        oracle: '输入框显示值为 "qa+{{uuid}}@example.com"'
      - n: 2
        action: '在 accessibility-id="password", label="密码" 的输入框输入 "wrong-password"'
        oracle: "输入框显示 14 位圆点掩码"
      - n: 3
        action: '点击 accessibility-id="btn_login", label="登录"'
        oracle:
          - '等待 accessibility-id="login_error" 在 3 秒内出现'
          - 'accessibility-id="login_error" 的 label 包含 "邮箱或密码错误"'
          - 'accessibility-id="home_title" 不在当前屏幕的 view hierarchy 中'

    assertions:
      accessibility:
        - rule: HIG-TargetSize
          target: 'accessibility-id="btn_login", label="登录"'
          min_target_size_pt: 44

    cleanup:
      - "通过测试后台删除账号 (idempotent)"

    testability:
      oracle_present: true
      state_reachable: true
      deterministic: true
      isolated: true
      has_explicit_wait: true
      wait_spec: "step 3 waits up to 3s for login_error; subsequent oracles check the same post-event state"

  - id: TC-LOGIN-003
    title: "密码字段 SQL-like payload 不得触发服务端异常且应作为普通密码处理"
    priority: P1
    requirement_ref: "PRD-2026-019 §2.1-c (credential inputs are opaque strings)"
    tags: [security, injection]

    preconditions:
      state: "应用冷启动至登录页"
      data_setup:
        - "通过测试后台删除任何 qa+{{uuid}}@example.com (idempotent)"
        - "通过测试后台创建账号 qa+{{uuid}}@example.com, password Pa$$word-1"

    steps:
      - n: 1
        action: '在 accessibility-id="email", label="邮箱" 的输入框输入 "qa+{{uuid}}@example.com"'
        oracle: "输入框显示完整邮箱"
      - n: 2
        action: "在密码字段输入 \"' OR 1=1 --\""
        oracle: "输入框显示 12 位圆点掩码"
      - n: 3
        action: '点击 accessibility-id="btn_login", label="登录"'
        oracle:
          - '等待 accessibility-id="login_error" 在 3 秒内出现'
          - 'accessibility-id="login_error" 的 label 匹配正则 /邮箱或密码错误/ (不应泄露任何数据库或栈信息)'
          - 'accessibility-id="home_title" 不在当前屏幕的 view hierarchy 中'

    cleanup:
      - "通过测试后台删除账号 (idempotent)"

    testability:
