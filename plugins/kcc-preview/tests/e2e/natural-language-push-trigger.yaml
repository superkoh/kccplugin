# L3 case (v0.4.0): a natural-language push request ("推到 preview") makes
# Claude push and emit the announcement line. This is the user-triggered
# replacement for the removed Stop-hook auto-enforcement.
#
# Assertion: stdout contains the push announcement string.

name: "kcc-preview pushes on a natural-language trigger"
prompt: |
  这是本 session 第一次推送。请把一条标题为 "NL trigger" 、正文为
  "hello from L3 nl trigger" 的简短说明推到 preview(推一下)。
  按 kcc-preview 规则,首次推送还要写 label.txt。推送后用一句话确认即可,
  然后停止。
model: claude-sonnet-4-6
maxBudgetUsd: 0.50
timeoutMs: 180000

allowedTools:
  - Write
  - Bash

expect:
  exitCode: 0
  parsedJson:
    type: "result"
    subtype: "success"
    is_error: false
  stdout:
    contains:
      - "已推送到 preview"
