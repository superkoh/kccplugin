feature: "结算页优惠券应用"
requirement_ref: "PRD-2026-042 §4.2"
platform: web
design_tokens_source: "design/tokens.json"
ui_change: true
generated_at: "2026-04-18"
generated_by: "kcc-testing/write-test-cases v0.1"

cases:
  - id: TC-COUPON-001
    title: "输入有效优惠码后订单总价正确扣减"
    priority: P0
    tags: [happy-path, pricing]

    preconditions:
      state: "用户已登录且购物车含 1 件 ¥100 的商品"
      data_setup:
        - "通过 API POST /test/fixtures/user 创建 qa+{{uuid}}@example.com, role=buyer"
        - "通过 API POST /test/fixtures/cart 放入 SKU-1001 数量 1"
        - "确保优惠券 WELCOME10 存在且有效 (-10%)"

    steps:
      - n: 1
        action: '在 role=textbox, name="优惠码" 的输入框输入 "WELCOME10"'
        oracle: '输入框的值为 "WELCOME10"'
      - n: 2
        action: '点击 role=button, name="应用优惠码"'
        oracle: 'role=status, name="优惠码状态" 的文本包含 "已应用"'
      - n: 3
        action: "等待订单汇总刷新"
        oracle: "订单总价文本为 ¥90.00 (原价 ¥100 - 10%)"

    assertions:
      visual:
        - target: 'role=button, name="应用优惠码"'
          property: background-color
          expected: "{token: color.primary.500}"
          resolved_value: "#1E6FFF"
          tolerance: strict
        - target: 'role=status, name="优惠码状态"'
          property: color
          expected: "{token: color.success.600}"
          resolved_value: "#0F8A4A"
          tolerance: strict
      accessibility:
        - rule: WCAG-1.4.3
          target: 'role=status, name="优惠码状态"'
          min_contrast_ratio: 4.5
        - rule: WCAG-2.5.8
          target: 'role=button, name="应用优惠码"'
          min_target_size_px: 24

    cleanup:
      - "删除测试用户及其所有订单"

    testability:
      oracle_present: true
      state_reachable: true
      deterministic: true
      isolated: true
      waits_specified: "step 3 waits up to 5s for order summary refresh"

  - id: TC-COUPON-002
    title: "过期优惠码应明确报错且不改动总价"
    priority: P1
    tags: [error, boundary]

    preconditions:
      state: "用户已登录且购物车含 1 件 ¥100 的商品"
      data_setup:
        - "通过 API POST /test/fixtures/user 创建 qa+{{uuid}}@example.com, role=buyer"
        - "通过 API POST /test/fixtures/cart 放入 SKU-1001 数量 1"
        - "确保优惠券 EXPIRED50 存在但已过期"

    steps:
      - n: 1
        action: '在 role=textbox, name="优惠码" 的输入框输入 "EXPIRED50"'
        oracle: '输入框的值为 "EXPIRED50"'
      - n: 2
        action: '点击 role=button, name="应用优惠码"'
        oracle: 'role=alert 的文本包含 "优惠码已过期"'
      - n: 3
        action: "检查订单总价"
        oracle: "订单总价文本仍为 ¥100.00"

    assertions:
      visual:
        - target: "role=alert"
          property: color
          expected: "{token: color.danger.600}"
