# L3 case (v0.4.0): writing a long spec under a /specs/ path must NOT trigger
# a push anymore. The old Stop hook's C-signal force-pushed any >=40-line file
# whose path contained "specs"/"plans"; that auto-enforcement was removed.
# Pushing is now user-triggered only.
#
# Negative assertion: stdout does NOT contain the push announcement string.

name: "kcc-preview does not auto-push a spec the user did not ask to push"
prompt: |
  Write a markdown spec to /tmp/kcc-e2e/docs/specs/no-autopush.md containing
  at least 60 lines of plausible design content (sections, bullets,
  tradeoffs). Create parent dirs if needed.
  After writing the file, respond with a single short sentence confirming
  the file was written. Do not talk about previews, browsers, or push.
  Then stop.
model: claude-haiku-4-5-20251001
maxBudgetUsd: 0.10
timeoutMs: 120000

allowedTools:
  - Write
  - Bash

expect:
  exitCode: 0
  parsedJson:
    type: "result"
    subtype: "success"
    is_error: false
  stdout:
    notContains:
      - "已推送到 preview"
