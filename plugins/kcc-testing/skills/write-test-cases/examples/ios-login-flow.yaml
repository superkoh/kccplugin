# Example — iOS login feature.
# Demonstrates accessibility-id locator vocabulary and HIG 44pt floor.
# requirement_ref below is illustrative only — adopt your own PRD/ticket scheme.

feature: "邮箱密码登录"
requirement_ref: "PRD-2026-019 §2.1"
platform: ios
design_tokens_source: null
ui_change: false
generated_at: "2026-04-18"
generated_by: "kcc-testing/write-test-cases v0.1"

cases:
  - id: TC-LOGIN-001
    title: "正确邮箱与密码登录成功并进入首页"
    priority: P0
    tags: [happy-path, auth]

    preconditions:
      state: "应用冷启动至登录页"
      data_setup:
        - "通过测试后台创建账号 qa+{{uuid}}@example.com, password Pa$$word-1, role=buyer"

    steps:
      - n: 1
        action: '在 accessibility-id="email", label="邮箱" 的输入框输入 "qa+{{uuid}}@example.com"'
        oracle: '输入框显示值为 "qa+{{uuid}}@example.com"'
      - n: 2
        action: '在 accessibility-id="password", label="密码" 的输入框输入 "Pa$$word-1"'
        oracle: "输入框显示 6 位圆点掩码"
      - n: 3
        action: '点击 accessibility-id="btn_login", label="登录"'
        oracle: '等待 accessibility-id="home_title", label="首页" 在 5 秒内出现'

    assertions:
      accessibility:
        - rule: HIG-TargetSize
          target: 'accessibility-id="btn_login", label="登录"'
          min_target_size_pt: 44
        - rule: HIG-Contrast
          target: 'accessibility-id="btn_login", label="登录"'
          min_contrast_ratio: 4.5

    cleanup:
      - "通过测试后台删除账号及任何登录会话"

    testability:
      oracle_present: true
      state_reachable: true
      deterministic: true
      isolated: true
      waits_specified: "step 3 waits up to 5s for home_title"

  - id: TC-LOGIN-002
    title: "错误密码应提示且不跳转"
    priority: P1
    tags: [error]

    preconditions:
      state: "应用冷启动至登录页"
      data_setup:
        - "通过测试后台创建账号 qa+{{uuid}}@example.com, password Pa$$word-1"

    steps:
      - n: 1
        action: '在 accessibility-id="email", label="邮箱" 的输入框输入 "qa+{{uuid}}@example.com"'
        oracle: '输入框显示值为 "qa+{{uuid}}@example.com"'
      - n: 2
        action: '在 accessibility-id="password", label="密码" 的输入框输入 "wrong-password"'
        oracle: "输入框显示掩码"
      - n: 3
        action: '点击 accessibility-id="btn_login", label="登录"'
        oracle: 'accessibility-id="login_error", label 包含 "邮箱或密码错误" 在 3 秒内出现'
      - n: 4
        action: "在 step 3 的 oracle 满足后立即检查当前屏幕"
        oracle: 'accessibility-id="home_title" 在本次检查时不在 DOM 中'

    assertions:
      accessibility:
        - rule: HIG-TargetSize
          target: 'accessibility-id="btn_login", label="登录"'
          min_target_size_pt: 44

    cleanup:
      - "通过测试后台删除账号"

    testability:
      oracle_present: true
      state_reachable: true
      deterministic: true
      isolated: true
      waits_specified: "step 3 waits up to 3s for error; step 4 checks immediately after"
