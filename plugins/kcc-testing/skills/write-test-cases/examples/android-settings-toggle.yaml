# Example — Android settings feature.
# Demonstrates content-description / resource-id locator vocabulary and Material 48dp floor.
# requirement_ref below is illustrative only — adopt your own PRD/ticket scheme.

feature: "设置页通知开关"
requirement_ref: "PRD-2026-073 §3.3"
platform: android
design_tokens_source: null
ui_change: false
generated_at: "2026-04-18"
generated_by: "kcc-testing/write-test-cases v0.1"

cases:
  - id: TC-SETTINGS-001
    title: "打开通知开关后状态持久化到重启"
    priority: P0
    tags: [happy-path, persistence]

    preconditions:
      state: "应用已登录并进入 设置 → 通知 页"
      data_setup:
        - "通过测试后台创建账号 qa+{{uuid}}@example.com 并将通知设置置为 off"

    steps:
      - n: 1
        action: '点击 resource-id="com.app:id/switch_notifications", content-description="通知开关"'
        oracle: '开关的 content-description 更新为 "通知开关，已开启"'
      - n: 2
        action: "触发冷重启 (kill + relaunch)"
        oracle: "应用回到设置 → 通知 页 (等待最多 5 秒)"
      - n: 3
        action: '检查 resource-id="com.app:id/switch_notifications" 的状态'
        oracle: '开关的 content-description 仍为 "通知开关，已开启"'

    assertions:
      accessibility:
        - rule: Material-TargetSize
          target: 'resource-id="com.app:id/switch_notifications"'
          min_target_size_dp: 48
        - rule: Material-Contrast
          target: 'resource-id="com.app:id/switch_label"'
          min_contrast_ratio: 4.5

    cleanup:
      - "通过测试后台删除账号"
      - "清除应用 shared preferences"

    testability:
      oracle_present: true
      state_reachable: true
      deterministic: true
      isolated: true
      waits_specified: "step 2 waits up to 5s for app resume"

  - id: TC-SETTINGS-002
    title: "关闭网络时切换开关应显示离线提示且不改变状态"
    priority: P1
    tags: [error, network]

    preconditions:
      state: "应用进入 设置 → 通知 页，通知开关为 off"
      data_setup:
        - "通过测试后台创建账号 qa+{{uuid}}@example.com 并将通知设置置为 off"
        - "切换设备到飞行模式"

    steps:
      - n: 1
        action: '点击 resource-id="com.app:id/switch_notifications", content-description="通知开关"'
        oracle: 'resource-id="com.app:id/snackbar_offline" 的文本包含 "当前无网络"'
      - n: 2
        action: "等待 snackbar 消失后检查开关"
        oracle: '开关的 content-description 仍为 "通知开关，已关闭"'

    assertions:
      accessibility:
        - rule: Material-TargetSize
          target: 'resource-id="com.app:id/switch_notifications"'
          min_target_size_dp: 48

    cleanup:
      - "关闭飞行模式"
      - "通过测试后台删除账号"

    testability:
      oracle_present: true
      state_reachable: true
      deterministic: true
      isolated: true
      waits_specified: "step 2 waits up to 4s for Material default snackbar dismiss"
