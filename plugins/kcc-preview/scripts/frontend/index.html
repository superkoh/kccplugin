<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kcc-preview</title>
<link rel="stylesheet" href="/assets/styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.css">
</head>
<body>
<div id="app">
  <header id="topbar">
    <span class="brand">kcc-preview</span>
    <span id="status-dot" class="status-dot" title="disconnected"></span>
    <nav id="tabs" class="tabs" aria-label="sessions"></nav>
  </header>
  <aside id="sidebar">
    <div id="index-list" class="index-list">
      <div class="empty">No active sessions — start a Claude Code session.</div>
    </div>
  </aside>
  <main id="viewport">
    <header class="viewport-header">
      <h1 id="current-title">kcc-preview</h1>
      <span id="current-meta" class="muted"></span>
    </header>
    <section id="content-host" class="content-host"></section>
  </main>
</div>

<script type="module" src="/assets/app.js"></script>
</body>
</html>
