# Example — Android settings feature.
# Demonstrates content-description / resource-id locator vocabulary and Material 48dp floor.
# NOTE: this example assumes the CURRENT change is a backend persistence fix only —
# the switch UI layout / styling is unchanged from the prior release.
# That is why ui_change is false despite the settings page being visible.
# requirement_ref values are illustrative — adopt your own PRD/ticket scheme.

feature: "设置页通知开关"
requirement_ref: "PRD-2026-073 §3.3"
platform: android
design_tokens_source: null
ui_change: false
coverage_triggers:
  security: false
  i18n: false
  performance: true
generated_at: "2026-04-20"
generated_by: "kcc-testing/write-test-cases v0.2"

rtm_summary:
  requirement_branches_total: 3
  requirement_branches_covered: 3
