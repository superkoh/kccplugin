# L3 case: Stop hook still blocks when the long-form file is under /specs/
# (C-signal). The prompt tells Claude to write a plausible spec and NOT
# mention preview. A compliant Stop hook fires block, Claude re-enters,
# writes a kind:file entry, and emits `👀 已推送到 preview`.
#
# Assertion: stdout contains the push announcement string.

name: "kcc-preview Stop hook blocks spec-path writes (C signal)"
prompt: |
  Write a markdown spec to /tmp/kcc-e2e/docs/specs/trigger-spec.md
  containing at least 60 lines of plausible design content (sections,
  bullets, tradeoffs). Create parent dirs if needed.
  After writing the file, respond with a single short sentence confirming
  the file was written. Do not talk about previews, browsers, or push.
  Then stop.
model: claude-sonnet-4-6
maxBudgetUsd: 0.50
timeoutMs: 180000

allowedTools:
  - Write
  - Bash

expect:
  exitCode: 0
  parsedJson:
    type: "result"
    subtype: "success"
    is_error: false
  stdout:
    contains:
      - "已推送到 preview"
